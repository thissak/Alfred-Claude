# 장 마감 리포트 관심종목 설정
# 카테고리별로 분류하여 리포트에 섹션별로 표시된다.
# focus: 해당 종목에서 매일 확인할 분석 포인트
# context: 투자 맥락 (있는 경우만)

categories:
  반도체:
    - code: "005930"
      name: 삼성전자
      focus: 외인/기관 수급, 반도체 업황
    - code: "000660"
      name: SK하이닉스
      focus: HBM 뉴스, 수급 흐름
    - code: "471990"
      name: KODEX AI반도체핵심장비
      focus: ETF 추세, AI 투자 심리

  방산:
    - code: "0080G0"
      name: KODEX 방산TOP10
      focus: 이란전 연동, 방산 수주 뉴스

  에너지:
    - code: "322000"
      name: HD현대에너지솔루션
      focus: 낙폭 과대 여부, 에너지 정책 뉴스

  게임:
    - code: "263750"
      name: 펄어비스
      focus: 진입 타이밍 분석 — 지지선/수급/기술적 패턴
      context: |
        500~1000만원 규모 진입 검토 중.
        붉은사막 히트 후 후속 모멘텀(DLC/콘솔/IP확장) 기대.
        매일 판단: 진입/관망/분할매수.
        붉은사막 관련 뉴스(판매량 추이/스팀 리뷰/콘솔 발표) 반드시 포함.
